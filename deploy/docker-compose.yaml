# Local development — no AWS credentials needed
# Usage: docker compose -f deploy/docker-compose.yaml up --build

services:
  taxi-fare-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      LOG_LEVEL: DEBUG
      MODEL_NAME: catboost
      MODEL_VERSION: v1
      ENABLE_METRICS: "false"
      ENABLE_DRIFT: "false"
    volumes:
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
